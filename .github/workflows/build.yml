name: Build

on:
  push:
  pull_request:

jobs:
  firmware-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi

      - name: Configure Debug build
        run: cmake --preset Debug

      - name: Build Debug firmware
        run: cmake --build --preset Debug

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc

      - name: Configure
        run: cmake -S Core/Tests/unit -B Core/Tests/unit/build

      - name: Build
        run: cmake --build Core/Tests/unit/build --parallel $(nproc)

      - name: Run tests
        run: |
          ctest --test-dir Core/Tests/unit/build \
                --output-on-failure \
                --output-junit test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: Core/Tests/unit/build/test-results.xml
