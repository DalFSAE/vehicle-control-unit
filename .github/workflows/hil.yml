name: HIL Tests

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main, "**"]
  pull_request:

jobs:
  hil-tests:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-debug-elf
          path: build/Debug
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Flash firmware
        run: |
          openocd -f interface/stlink.cfg \
                  -f target/stm32f4x.cfg \
                  -c "program build/Debug/DMS-24-RTOS-VCU.elf verify reset exit"

      - name: Install Python dependencies
        run: pip install -r scripts/hil/requirements.txt

      - name: Run HIL tests
        run: |
          pytest scripts/hil/test_fsm.py \
                 --port /dev/ttyACM0 \
                 -v \
                 --junit-xml=hil-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hil-test-results
          path: hil-results.xml
